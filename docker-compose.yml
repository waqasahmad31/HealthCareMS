services:
  postgres:
    image: postgres:16-alpine
    container_name: HealthCareMS.PostgreSQL
    environment:
      POSTGRES_DB: HealthCareMS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - HealthCareMS.PostgreSQL.Data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d HealthCareMS"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  HealthCareMS.PostgreSQL.Data:
